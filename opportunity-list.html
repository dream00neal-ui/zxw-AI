<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>
<style>

.shimmer-text{background:linear-gradient(90deg,#60a5fa 0%,#e2e8f0 40%,#60a5fa 60%,#93c5fd 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
.highlight-keyword{background:#fef08a;color:#92400e;padding:0 2px;border-radius:2px;font-weight:600}
.highlight-flow{background:#dbeafe;color:#1e40af;padding:0 2px;border-radius:2px;font-weight:600}
</style>

<body class="bg-gray-50 text-gray-800 text-sm flex h-screen overflow-hidden">

<aside id="left-nav" class="w-44 flex-shrink-0 bg-[#0f172a] text-white flex flex-col overflow-y-auto"></aside>

<div class="flex-1 flex flex-col overflow-hidden">
  <!-- Top Header -->
  <header class="bg-white border-b border-gray-200 flex-shrink-0">
    <div class="flex items-center px-4 h-11 gap-4">
      <nav class="flex gap-1 flex-1">
        <a href="opportunity-list.html" class="px-3 py-1.5 text-sm text-blue-600 font-medium border-b-2 border-blue-600">项目信息</a>

      </nav>
      <div class="flex items-center gap-3 text-sm">
        <button class="text-orange-500 font-medium flex items-center gap-1">🔥 微信商机订阅助手</button>
        <span class="text-gray-400">帮助中心</span>
        <div class="w-7 h-7 rounded-full bg-blue-600 text-white flex items-center justify-center font-medium">李</div>
      </div>
    </div>
    <!-- Search bar -->
    <div class="bg-blue-700 px-4 py-3">
      <div class="flex gap-2 mb-2">
        <div class="flex items-center gap-1 bg-blue-600 text-blue-200 text-sm px-2 py-1 rounded cursor-pointer">按产品品词 <span class="text-yellow-300 text-[12px]">new</span> ▾</div>
        <div class="flex-1 bg-white rounded flex items-center px-3 gap-2">
          <input id="search-input" type="text" placeholder="输入采购设备词、工艺流程关键词..." class="flex-1 text-sm outline-none py-1.5" value="主变压器">
          <span class="text-gray-300">|</span>
          <span class="text-sm text-gray-400">或者 ▾</span>
          <input type="text" placeholder="支持多个关键词，以','隔开" class="flex-1 text-sm outline-none py-1 text-gray-500">
        </div>
        <button onclick="doSearch()" class="bg-orange-500 text-white text-sm px-5 py-1.5 rounded font-medium hover:bg-orange-600">🔍 搜 索</button>
        <button class="bg-blue-600 text-blue-100 text-sm px-3 py-1.5 rounded border border-blue-400 hover:bg-blue-500">📋 高级搜索</button>
      </div>
      <!-- 搜索词类型提示标签 -->
      <div class="flex flex-wrap gap-1.5 items-center">
        <span class="text-blue-200 text-[12px] bg-blue-600 px-1.5 py-0.5 rounded">定制搜索</span>
        <span onclick="setSearch('主变压器')" class="text-blue-100 text-[13px] cursor-pointer hover:text-white">主变压器</span>
        <span onclick="setSearch('抽水蓄能')" class="text-blue-100 text-[13px] cursor-pointer hover:text-white">抽水蓄能</span>
        <span onclick="setSearch('GIS开关设备')" class="text-blue-100 text-[13px] cursor-pointer hover:text-white">GIS开关设备</span>
        <span onclick="setSearch('空压机')" class="text-blue-100 text-[13px] cursor-pointer hover:text-white">空压机</span>
        <span onclick="setSearch('泵阀')" class="text-blue-100 text-[13px] cursor-pointer hover:text-white">泵阀</span>
        <span onclick="setSearch('脱硫脱硝工艺')" class="text-blue-100 text-[13px] cursor-pointer hover:text-white">脱硫脱硝工艺</span>
        <span onclick="setSearch('200亿元以上')" class="text-blue-100 text-[13px] cursor-pointer hover:text-white">200亿元以上</span>
        <span class="text-blue-300 text-[12px] ml-1 border-l border-blue-500 pl-2">🔵 蓝底=采购设备词  🟡 黄底=工艺流程词</span>
      </div>
    </div>
    <!-- Filter bar -->
    <div class="px-4 py-2 flex items-center gap-3 border-b border-gray-100">
      <span class="text-sm text-gray-500">筛选条件：</span>
      <select class="text-sm border border-gray-200 rounded px-2 py-1 text-gray-600">行业 ▾</select>
      <select class="text-sm border border-gray-200 rounded px-2 py-1 text-gray-600">地区 ▾</select>
      <select class="text-sm border border-gray-200 rounded px-2 py-1 text-gray-600">项目阶段 ▾</select>
      <select class="text-sm border border-gray-200 rounded px-2 py-1 text-gray-600">投资额 ▾</select>
      <select id="filter-category" onchange="renderList()" class="text-sm border border-blue-300 rounded px-2 py-1 text-blue-600 bg-blue-50">
        <option value="">全部品类</option>
        <option value="泵阀">泵阀类</option>
        <option value="空压机">空压机类</option>
        <option value="变压器">变压器类</option>
        <option value="GIS">GIS/开关类</option>
      </select>
      <div class="ml-auto flex gap-2 text-sm text-blue-600 cursor-pointer">
        <span>💾 保存为搜索模板</span>
        <span class="text-red-400">🗑 清空</span>
      </div>
    </div>
  </header>

  <!-- Content -->
  <div class="flex-1 overflow-hidden flex">
    <main class="flex-1 overflow-y-auto p-4">

      <!-- AI千人千面推荐横幅 -->
      <div class="bg-gradient-to-r from-blue-900 to-blue-700 rounded-xl p-3 mb-3 flex items-center gap-4">
        <div class="shimmer-text text-sm font-bold whitespace-nowrap">AI 千人千面推荐</div>
        <div class="text-blue-100 text-sm flex-1">
          根据您的主营产品「<span class="text-yellow-300 font-bold">主变压器 / 交钥匙工程</span>」，为您智能筛选高匹配度项目
        </div>
        <div class="flex gap-2 flex-wrap">
          <span class="bg-blue-600 text-blue-100 text-[12px] px-2 py-1 rounded-full border border-blue-400 cursor-pointer hover:bg-blue-500">⚡ 主变压器</span>
          <span class="bg-slate-700 text-slate-300 text-[12px] px-2 py-1 rounded-full cursor-pointer hover:bg-slate-600">💨 空压机</span>
          <span class="bg-slate-700 text-slate-300 text-[12px] px-2 py-1 rounded-full cursor-pointer hover:bg-slate-600">🔧 泵阀</span>
          <span class="bg-slate-700 text-slate-300 text-[12px] px-2 py-1 rounded-full cursor-pointer hover:bg-slate-600">GIS设备</span>
          <span class="bg-amber-600 text-white text-[12px] px-2 py-1 rounded-full cursor-pointer hover:bg-amber-500">+ 修改品类</span>
        </div>
      </div>

      <!-- Result stats -->
      <div class="text-sm text-gray-600 mb-2 flex items-center gap-2">
        已为您找到 <span class="text-orange-500 font-bold">89条</span> 项目信息（拟在建 <span class="text-orange-500 font-bold">89条</span>，原始 <span class="text-orange-500">0条</span>）；审批资讯 <span class="text-blue-600 font-bold">23条</span>
        <span id="search-match-tip" class="text-[12px] bg-yellow-100 border border-yellow-300 text-yellow-700 px-2 py-0.5 rounded-full hidden"></span>
      </div>

      <!-- Sub tabs -->
      <div class="flex gap-1 mb-3 border-b border-gray-200 bg-white rounded-t-lg px-3 pt-2">
        <button class="px-3 py-2 text-sm text-blue-600 font-medium border-b-2 border-blue-600">全部</button>
        <button class="px-3 py-2 text-sm text-gray-500 hover:text-gray-700">VIP项目</button>
        <button class="px-3 py-2 text-sm text-gray-500 hover:text-gray-700">跟踪项目</button>
        <button class="px-3 py-2 text-sm text-orange-500 font-medium">🔥 AI推荐</button>
        <div class="ml-auto flex items-center gap-3 text-sm text-gray-500 pb-1">
          <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" class="w-3 h-3"> 仅查看首发</label>
          <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" class="w-3 h-3"> 仅看预计采购</label>
          <select class="border border-gray-200 rounded px-1.5 py-0.5 text-sm">默认排序 ▾</select>
        </div>
      </div>

      <div id="project-list" class="space-y-2"></div>
    </main>

  </div>
</div>

<script src="shared.js"></script>
<script>
renderNav('找商机');

const PROJECTS = [
  {id:1, title:"上西索凯抽水蓄能电站项目", tags:["VIP","跟踪","AI强推"], stage:"土建施工", invest:"80000", area:"印度尼西亚", company:"葛洲坝集团国际工程有限公司", date:"2026-05-22", match:98, matchLabel:"主变压器×4台", category:"变压器", equipWords:["主变压器"], flowWords:["抽水蓄能"], tip:"4台260MW机组，主变压器采购窗口即将开启（约58天）", link:"opportunity-detail.html"},
  {id:2, title:"丰宁抽水蓄能电站二期扩建工程", tags:["VIP","AI强推"], stage:"报批立项", invest:"150000", area:"河北省", company:"国网新源控股有限公司", date:"2026-06-01", match:95, matchLabel:"主变压器×6台", category:"变压器", equipWords:["主变压器"], flowWords:["抽水蓄能"], tip:"国网体系抽蓄项目，规格与上西索凯类似，可打包报价", link:"opportunity-detail.html"},
  {id:3, title:"当阳坝陵园区热电联产项目", tags:["VIP","跟踪","正文包含"], stage:"初步设计", invest:"83500", area:"湖北省", company:"当阳市坝陵园区产业投资有限责任公司", date:"2026-06-04", match:85, matchLabel:"主变压器×2台", category:"变压器", equipWords:["主变压器"], flowWords:["热电联产"], tip:"热电联产项目，主变压器规格250MVA，预计Q3招标"},
  {id:4, title:"镇江某大型化工园区空分装置项目", tags:["跟踪","AI强推"], stage:"设备采购", invest:"42000", area:"江苏省", company:"镇江沿江工业园区管委会", date:"2026-06-05", match:91, matchLabel:"空压机×6台", category:"空压机", equipWords:["空压机","离心压缩机"], flowWords:["空分工艺","低温液化"], tip:"空分项目核心设备，离心式空压机总需求约6台，本月启动招标"},
  {id:5, title:"陕西延长石油天然气处理装置扩建", tags:["VIP","正文包含"], stage:"施工图设计", invest:"98000", area:"陕西省", company:"延长石油集团", date:"2026-06-03", match:88, matchLabel:"空压机×4台 / 泵阀×多台", category:"空压机", equipWords:["空压机","往复式压缩机"], flowWords:["天然气处理","脱硫脱碳工艺"], tip:"天然气处理工艺，压缩机+泵阀联动采购，建议捆绑报价"},
  {id:6, title:"安达市天樾风光储制氢项目", tags:["跟踪","碳中和"], stage:"施工图设计", invest:"1700000", area:"黑龙江省", company:"--", date:"2026-06-03", match:65, matchLabel:"泵阀×多台 / 升压变压器", category:"泵阀", equipWords:["泵阀","升压变压器"], flowWords:["制氢工艺","电解槽"], tip:"新能源制氢项目，电解液循环泵、阀门需求量大"},
  {id:7, title:"辛集市澳森特钢集团70MW背压发电项目", tags:["跟踪","正文包含"], stage:"土建施工", invest:"30065", area:"河北省", company:"辛集市澳森特钢集团有限公司", date:"2026-06-04", match:72, matchLabel:"主变压器×1台", category:"变压器", equipWords:["主变压器","发电机组"], flowWords:["煤气回收利用"], tip:"钢铁行业自备电站，主变压器需求明确"},
];

const keyword = new URLSearchParams(location.search).get('q') || '主变压器';
document.getElementById('search-input').value = keyword;

function hl(text, words, cls='highlight-keyword') {
  let r = text;
  words.forEach(w => { r = r.replace(new RegExp(w,'g'), `<span class="${cls}">${w}</span>`); });
  return r;
}

function doSearch() {
  const q = document.getElementById('search-input').value;
  location.href = '?q=' + encodeURIComponent(q);
}
function setSearch(v) { document.getElementById('search-input').value = v; doSearch(); }

function renderList() {
  const cat = document.getElementById('filter-category').value;
  const q = keyword;
  let list = PROJECTS;
  if (cat) list = list.filter(p => p.category.includes(cat) || p.tags.some(t=>t.includes(cat)));

  // 统计关键词命中
  let hitCount = 0;
  const el = document.getElementById('project-list');
  el.innerHTML = list.map(p => {
    const matchColor = p.match>=90?'green':p.match>=70?'blue':'gray';
    // 高亮：采购设备词用黄色，工艺流程词用蓝色
    let titleHtml = p.title;
    titleHtml = hl(titleHtml, p.equipWords, 'highlight-keyword');
    titleHtml = hl(titleHtml, p.flowWords, 'highlight-flow');
    // 命中提示
    const hitEquip = p.equipWords.some(w => q.includes(w) || w.includes(q));
    const hitFlow = p.flowWords.some(w => q.includes(w) || w.includes(q));
    if (hitEquip || hitFlow) hitCount++;
    const hitBadge = hitEquip
      ? `<span class="text-[12px] bg-yellow-100 border border-yellow-400 text-yellow-700 px-1.5 py-0.5 rounded-full">采购设备词命中</span>`
      : hitFlow
      ? `<span class="text-[12px] bg-blue-100 border border-blue-400 text-blue-700 px-1.5 py-0.5 rounded-full">工艺流程词命中</span>`
      : '';

    return `<div class="bg-white rounded-lg border border-gray-200 p-3 hover:border-blue-300 hover:shadow-sm transition-all cursor-pointer" onclick="location.href='${p.link||'#'}'">
      <div class="flex items-start gap-2 mb-1.5">
        <div class="flex-1">
          <div class="flex items-center gap-1.5 mb-1">
            <a href="${p.link||'#'}" class="text-sm font-semibold text-blue-700 hover:text-blue-900">${titleHtml}</a>
            ${hitBadge}
          </div>
          <div class="flex flex-wrap gap-1">
            ${p.tags.map(t=>{
              const tc = t==='VIP'?'bg-amber-500 text-white':t.includes('AI强推')?'bg-green-600 text-white':t.includes('正文包含')?'bg-blue-100 text-blue-700 border border-blue-300':'bg-gray-100 text-gray-600';
              return `<span class="text-[12px] px-1.5 py-0.5 rounded font-medium ${tc}">${t}</span>`;
            }).join('')}
          </div>
        </div>
        <div class="flex-shrink-0 text-right">
          <div class="text-[12px] text-gray-400 mb-0.5">AI匹配度</div>
          <div class="text-${matchColor}-600 font-bold text-base">${p.match}%</div>
          <div class="text-[12px] text-${matchColor}-600">${p.matchLabel}</div>
        </div>
      </div>
      <div class="bg-orange-50 border-l-2 border-orange-400 px-2 py-1 rounded-r mb-2 text-[12px] text-orange-700">💡 ${p.tip}</div>
      ${(p.equipWords.length || p.flowWords.length) ? `<div class="flex gap-1 flex-wrap mb-2">
        ${p.equipWords.map(w=>`<span class="text-[12px] bg-yellow-100 border border-yellow-300 text-yellow-800 px-1.5 py-0.5 rounded">📦 ${w}</span>`).join('')}
        ${p.flowWords.map(w=>`<span class="text-[12px] bg-blue-100 border border-blue-300 text-blue-700 px-1.5 py-0.5 rounded">⚙️ ${w}</span>`).join('')}
      </div>` : ''}
      <div class="flex items-center gap-4 text-[13px] text-gray-500 flex-wrap">
        <span>💰 <b class="text-orange-500">${parseInt(p.invest).toLocaleString()}万元</b></span>
        <span>📍 ${p.area}</span>
        <span>🏗 ${p.stage}</span>
        <span>📅 ${p.date}</span>
        <span class="flex-1 truncate">🏢 ${p.company}</span>
        <a href="${p.link||'#'}" class="text-blue-600 hover:text-blue-800 font-medium ml-auto" onclick="event.stopPropagation()">查看详情 →</a>
      </div>
    </div>`;
  }).join('');

  const tip = document.getElementById('search-match-tip');
  if (hitCount > 0) {
    tip.textContent = `关键词「${q}」在 ${hitCount} 个项目中命中`;
    tip.classList.remove('hidden');
  }
}
renderList();
</script>
</body>
</html>
